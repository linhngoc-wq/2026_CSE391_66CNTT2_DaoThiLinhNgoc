<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý điểm sinh viên - K66</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

    <div class="container">
        <h2>Quản lý điểm sinh viên</h2>
        
        <div class="input-group">
            <input type="text" id="fullname" placeholder="Họ tên sinh viên...">
            <input type="number" id="score" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
            <button id="btnAdd">Thêm vào danh sách</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ tên</th>
                    <th>Điểm</th>
                    <th>Xếp loại</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                </tbody>
        </table>

        <div class="statistics">
            <p>Tổng số sinh viên: <span id="totalStudents">0</span></p>
            <p>Điểm trung bình lớp: <span id="avgScore">0.00</span></p>
        </div>
    </div>

    <script src="js.java"></script>
</body>
</html>
