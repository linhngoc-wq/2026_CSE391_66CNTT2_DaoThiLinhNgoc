<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form đăng kí</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <div class="container form-container">
    <h2>Đăng Ký Tài Khoản</h2>
    <form id="registerForm">
        <div class="form-group">
            <label>Họ và tên:</label>
            <input type="text" id="fullname" placeholder="Nhập ít nhất 3 ký tự...">
            <span class="error-msg" id="nameError"></span>
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="text" id="email" placeholder="example@domain.com">
            <span class="error-msg" id="emailError"></span>
        </div>

        <div class="form-group">
            <label>Số điện thoại:</label>
            <input type="text" id="phone" placeholder="0xxxxxxxxx">
            <span class="error-msg" id="phoneError"></span>
        </div>

        <div class="form-group">
            <label>Mật khẩu:</label>
            <input type="password" id="password" placeholder="Tối thiểu 8 ký tự, 1 hoa, 1 thường, 1 số">
            <span class="error-msg" id="passError"></span>
        </div>

        <div class="form-group">
            <label>Xác nhận mật khẩu:</label>
            <input type="password" id="confirmPassword">
            <span class="error-msg" id="confirmError"></span>
        </div>

        <button type="submit" id="btnSubmit">Đăng Ký</button>
    </form>

    <div id="successMsg" style="display: none; text-align: center; color: green; font-weight: bold;">
        <h3 id="welcomeUser"></h3>
    </div>
</div>
<script src="js.js"></script>
</body>
</html>
